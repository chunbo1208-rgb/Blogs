<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chunboblog</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/base.css" /> 
  <link rel="stylesheet" href="styles/index.css" />
</head>
<body>

<div class="site-wrap">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="site-header">
    <a href="index.html" class="site-title">Chunbo<span>Blog</span></a>

    <div class="lang-toggle" role="group" aria-label="Site language">
      <button class="lang-btn" data-lang="zh">中文</button>
      <button class="lang-btn active" data-lang="en">EN</button>
    </div>
  </header>

  <!-- ── Sections ───────────────────────────────────────────────── -->
  <section class="home-section" aria-label="Sections">
    <div class="section-heading">
      <h2 id="label-sections">Sections</h2>
    </div>
    <div class="sections-grid" id="sections-grid"></div>
  </section>

  <!-- ── Today's Posts ──────────────────────────────────────────── -->
  <section class="home-section" aria-label="Today's posts">
    <div class="section-heading">
      <h2 id="label-today">Today's Updates</h2>
      <span class="section-date" id="today-date"></span>
    </div>
    <div id="today-posts">
      <p class="empty-msg">Loading…</p>
    </div>
  </section>

  <!-- ── Top Reads ──────────────────────────────────────────────── -->
  <section class="home-section" aria-label="Top reads">
    <div class="section-heading">
      <h2 id="label-top">Top Reads</h2>
    </div>
    <div id="top-posts">
      <p class="empty-msg">Loading…</p>
    </div>
  </section>

</div>

<script src="posts-data.js"></script>
<script src="js/views.js"></script>
<script src="js/discover.js"></script>
</body>
</html>
