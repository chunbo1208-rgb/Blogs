<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chunboblog</title>

  <!-- KaTeX (for any inline math in post lists) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/index.css" />
</head>
<body>

<div class="site-wrap">

  <!-- ── Header ─────────────────────────────────────────────────── -->
  <header class="site-header">
    <a href="/" class="site-title">chunbo<span>blog</span></a>

    <div class="lang-toggle" role="group" aria-label="Language filter">
      <button class="lang-btn active" data-lang="all">All</button>
      <button class="lang-btn" data-lang="zh">中文</button>
      <button class="lang-btn" data-lang="en">EN</button>
    </div>
  </header>

  <!-- ── Today's Posts ──────────────────────────────────────────── -->
  <section class="home-section" aria-label="Today's posts">
    <div class="section-heading">
      <h2>Today</h2>
      <span class="section-date" id="today-date"></span>
    </div>
    <div id="today-posts">
      <p class="empty-msg">Loading…</p>
    </div>
  </section>

  <!-- ── Top 10 ─────────────────────────────────────────────────── -->
  <section class="home-section" aria-label="Most read">
    <div class="section-heading">
      <h2>Most Read</h2>
    </div>
    <div id="top-posts">
      <p class="empty-msg">Loading…</p>
    </div>
  </section>

  <!-- ── Sections ───────────────────────────────────────────────── -->
  <section class="home-section" aria-label="Sections">
    <div class="section-heading">
      <h2>Sections</h2>
    </div>
    <div class="sections-grid" id="sections-grid">
      <!-- populated by discover.js -->
    </div>
  </section>

</div><!-- /.site-wrap -->

<script src="posts-data.js"></script>
<script src="js/views.js"></script>
<script src="js/discover.js"></script>
<script>
  // Show today's date in the heading
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
</script>
</body>
</html>
