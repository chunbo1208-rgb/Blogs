<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chemistry — chunboblog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:wght@300;400;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/template-science.css" />
  <style>
    .index-wrap { max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem 6rem; }
    .index-header { margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .index-header h1 { font-family: 'DM Sans', sans-serif; font-size: 2rem; font-weight: 500; }
    .index-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; font-family: 'DM Sans', sans-serif; }
    .post-list { list-style: none; }
    .post-list-item { border-bottom: 1px solid var(--border); }
    .post-list-item a { display: flex; justify-content: space-between; align-items: baseline; padding: 1rem 0; gap: 1rem; color: var(--text); transition: opacity 0.15s; }
    .post-list-item a:hover { opacity: 0.65; }
    .post-list-title { font-family: 'Source Serif 4', serif; font-size: 1rem; }
    .post-list-meta { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .back { font-family: 'DM Sans', sans-serif; font-size: 0.83rem; color: var(--muted); margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 0.35rem; }
    .back:hover { color: var(--text); opacity: 1; }
    .empty { color: var(--muted); font-style: italic; padding: 1.5rem 0; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="index-wrap">
  <a href="../../index.html" class="back">← Home</a>
  <div class="index-header">
    <h1>🧪 Chemistry</h1>
    <p>Atoms, bonds, reactions — the language of matter.</p>
  </div>
  <ul class="post-list" id="post-list">
    <li class="empty">Loading…</li>
  </ul>
</div>
<script src="../../posts-data.js"></script>
<script src="../../js/views.js"></script>
<script>
(async () => {
  const items = (window.POSTS || []).filter(p => p.subject === 'chemistry').sort((a,b) => b.date.localeCompare(a.date));
  const views = await getAllViews(items.map(p => p.id));
  const list = document.getElementById('post-list');
  if (!items.length) { list.innerHTML = '<li class="empty">No posts yet.</li>'; return; }
  list.innerHTML = items.map(p => {
    const v = views[p.id] || 0;
    const rel = p.path.replace('posts/chemistry/', '');
    return `<li class="post-list-item"><a href="${rel}">
      <span class="post-list-title">${p.title}</span>
      <span class="post-list-meta">${p.custom_subject || ''} · ${v} views · ${p.date}</span>
    </a></li>`;
  }).join('');
})();
</script>
</body>
</html>
