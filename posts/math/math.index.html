<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math — chunboblog</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/base.css" />
  <link rel="stylesheet" href="../../styles/template-math.css" />
  <style>
    .index-wrap { max-width: 740px; margin: 0 auto; padding: 2.5rem 1.5rem 6rem; }
    .index-wrap .page-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2.5rem 3rem; }
    .index-header { margin-bottom: 2rem; }
    .index-header::before { content: 'SECTION'; font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.2em; color: var(--accent); display: block; margin-bottom: 0.4rem; }
    .index-header h1 { font-size: 1.9rem; font-weight: 600; font-family: 'Inter', sans-serif; }
    .index-header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; font-family: 'Inter', sans-serif; font-weight: 300; }
    .post-list { list-style: none; font-family: 'Inter', sans-serif; }
    .post-list-item { border-bottom: 1px solid var(--border); }
    .post-list-item a { display: flex; align-items: baseline; justify-content: space-between; padding: 0.9rem 0; gap: 1rem; color: var(--text); transition: opacity 0.15s; }
    .post-list-item a:hover { opacity: 0.65; }
    .post-list-title { font-size: 0.95rem; font-weight: 500; }
    .post-list-meta { font-size: 0.78rem; color: var(--muted); white-space: nowrap; font-family: var(--font-mono); }
    .back { font-size: 0.83rem; color: var(--muted); margin-bottom: 1.5rem; display: inline-flex; align-items: center; gap: 0.35rem; font-family: 'Inter', sans-serif; }
    .back:hover { color: var(--text); opacity: 1; }
    .empty { color: var(--muted); font-style: italic; padding: 1.5rem 0; }
  </style>
</head>
<body style="background: var(--bg); background-image: radial-gradient(circle, #CBD5E1 1px, transparent 1px); background-size:24px 24px; background-attachment:fixed;">
<div class="index-wrap">
  <a href="../../index.html" class="back">← Home</a>
  <div class="page-wrap">
    <div class="index-header">
      <h1>∑ Mathematics</h1>
      <p>Proofs, analysis, topology, and the beautiful structures beneath.</p>
    </div>
    <ul class="post-list" id="post-list">
      <li class="empty">Loading…</li>
    </ul>
  </div>
</div>
<script src="../../posts-data.js"></script>
<script src="../../js/views.js"></script>
<script>
(async () => {
  const views = getAllViews();
  const items = (window.POSTS || []).filter(p => p.subject === 'math').sort((a,b) => b.date.localeCompare(a.date));
  const list = document.getElementById('post-list');
  if (!items.length) { list.innerHTML = '<li class="empty">No posts yet.</li>'; return; }
  list.innerHTML = items.map(p => {
    const v = views[p.id] || 0;
    const rel = p.path.replace('posts/math/', '');
    return `<li class="post-list-item"><a href="${rel}">
      <span class="post-list-title">${p.title}</span>
      <span class="post-list-meta">${p.custom_subject || ''} · ${v}v · ${p.date}</span>
    </a></li>`;
  }).join('');
})();
</script>
</body>
</html>
